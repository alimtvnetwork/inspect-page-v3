<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Inspect Page</title>
    <style>
      /* Lock popup to the same compact extension viewport as the floating panel (412 x 820).
         Chrome will clamp popup height to ~600px on small displays, but on
         normal displays the popup will render at the full 820px.
         Overflow is scrollable but the scrollbar is hidden in every engine. */
      html, body {
        margin: 0;
        padding: 0;
        width: 412px;
        height: 820px;
        min-width: 412px;
        min-height: 820px;
        background: transparent;
        overflow: hidden;
      }
      #root {
        width: 412px;
        height: 820px;
        min-height: 820px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;          /* Firefox */
        -ms-overflow-style: none;       /* old Edge / IE */
      }
      #root::-webkit-scrollbar { width: 0; height: 0; display: none; } /* Chromium */
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
    <script type="module" crossorigin src="/popup/index.js"></script>
    <link rel="modulepreload" crossorigin href="/messaging.js">
    <link rel="stylesheet" crossorigin href="/index.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
