# SonarQube Project Configuration
# Enforces CODE RED coding guidelines from spec/02-coding-guidelines/
#
# Usage:
#   sonar-scanner -Dproject.settings=linters/sonarqube/sonar-project.properties
#
# Or place this file at your project root as sonar-project.properties

sonar.projectKey=coding-guidelines-project
sonar.projectName=Coding Guidelines Project
sonar.projectVersion=1.0

# ── Source directories ────────────────────────────────────────────
sonar.sources=src,backend,cmd
sonar.tests=src,backend
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.spec.ts

# ── Language-specific settings ────────────────────────────────────
sonar.go.coverage.reportPaths=coverage.out
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ── Exclusions ────────────────────────────────────────────────────
sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/generated/**

# ── CODE RED Rule Enforcement ────────────────────────────────────
# These map to SonarQube built-in rules. Import the companion
# quality profile (coding-guidelines-profile.xml) for full enforcement.

# CODE-RED-004: Max 15 lines per function
sonar.go.functions.maxLines=15
sonar.typescript.functions.maxLines=15

# Cognitive complexity threshold (supports CODE-RED-001 nesting detection)
sonar.go.cognitive-complexity.threshold=10
sonar.typescript.cognitive-complexity.threshold=10

# ── Quality Gate ──────────────────────────────────────────────────
# Fail the build if CODE RED violations exist
sonar.qualitygate.wait=true
