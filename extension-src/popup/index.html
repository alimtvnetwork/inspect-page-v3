<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Inspect Page</title>
    <style>
      /* Lock popup to Samsung Galaxy S20 Ultra viewport (412 x 915).
         Chrome will clamp popup height to ~600px on small displays, but on
         normal displays the popup will render at the full 915px.
         Overflow is scrollable but the scrollbar is hidden in every engine. */
      html, body {
        margin: 0;
        padding: 0;
        width: 412px;
        height: 915px;
        min-width: 412px;
        min-height: 915px;
        background: transparent;
        overflow: hidden;
      }
      #root {
        width: 412px;
        height: 915px;
        min-height: 915px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;          /* Firefox */
        -ms-overflow-style: none;       /* old Edge / IE */
      }
      #root::-webkit-scrollbar { width: 0; height: 0; display: none; } /* Chromium */
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
