# ──────────────────────────────────────────────────────────────
# Inspect Page — Release Pipeline
#
# Triggers (any path produces a Release with full asset set):
#   - push tag      ext-vX.Y.Z  | wp-vX.Y.Z
#   - push branch   release/ext-vX.Y.Z | release/wp-vX.Y.Z
#   - release event (REST API / gh CLI / web UI publish, edit, release)
#   - workflow_dispatch (manual replay/recovery against an existing tag)
#   - workflow_call    (release-watcher recovery)
#
# Assets produced per release:
#   - inspect-page-{VER}.zip     (ext tag) — Chrome extension
#     OR
#     inspect-page-wp-{VER}.zip  (wp tag)  — WordPress plugin
#   - install.sh        — Bash installer (URL-pinned ↔ latest auto-detect, extension only)
#   - install.ps1       — PowerShell installer (same logic)
#   - VERSION.txt       — plain-text version string
#   - changelog.md      — full project changelog (if present)
#   - checksums.txt     — SHA256 of all assets
#   - RELEASE_NOTES.md  — used as Release body (not uploaded as asset)
#
# `make_latest`: only ext-v* releases ever wear the green "Latest" badge.
# ──────────────────────────────────────────────────────────────
name: release

on:
  push:
    branches:
      - "release/ext-v*"
      - "release/wp-v*"
    tags:
      - "ext-v*"
      - "wp-v*"
  release:
    types: [published, created, edited, released]
  workflow_dispatch:
    inputs:
      version:
        description: "Existing tag to (re)publish, e.g. ext-v2.7.7 or wp-v2.6.0"
        required: true
        type: string
      source_ref:
        description: "Optional source ref/SHA to build from (recovery only)"
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: "Existing tag to (re)publish"
        required: true
        type: string
      source_ref:
        description: "Optional source ref/SHA to build from"
        required: false
        type: string
        default: ""

# Release builds must NEVER be cancelled.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: build · sign · publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends zip
      - run: bun install --frozen-lockfile

      - name: Resolve tag · kind · version (multi-trigger)
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version || github.event.inputs.version }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref || github.event.inputs.source_ref }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            TAG="$INPUT_VERSION"
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
            if ! git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "::error::recovery tag '${TAG}' not found on remote"; exit 1
            fi
            if [ -n "${INPUT_SOURCE_REF:-}" ]; then
              git fetch origin "$INPUT_SOURCE_REF" --depth=1 2>/dev/null || true
              git checkout "$INPUT_SOURCE_REF"
              echo "Recovery: building from $INPUT_SOURCE_REF, publishing to $TAG"
            else
              git checkout "refs/tags/${TAG}"
            fi
          elif [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG_NAME"
            [ -n "$TAG" ] || { echo "::error::release event without tag_name"; exit 1; }
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
            git checkout "refs/tags/${TAG}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          elif [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            TAG="${GITHUB_REF_NAME#release/}"
          else
            echo "::error::Unexpected ref: $GITHUB_REF"; exit 1
          fi
          case "$TAG" in
            ext-v*) KIND=ext; VERSION="${TAG#ext-v}";;
            wp-v*)  KIND=wp;  VERSION="${TAG#wp-v}";;
            *) echo "::error::Unknown tag format: $TAG"; exit 1;;
          esac
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "kind=$KIND"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG kind=$KIND version=$VERSION"

      - name: Build extension
        if: steps.meta.outputs.kind == 'ext'
        run: bash scripts/release.sh

      - name: Build WP plugin
        if: steps.meta.outputs.kind == 'wp'
        run: bash scripts/package-wp.sh

      - name: Validate
        run: |
          node scripts/ci/check-brand-name.mjs
          node scripts/ci/check-version-sync.mjs
          node scripts/ci/check-wp-version-sync.mjs

      - name: Stage release assets
        id: assets
        run: |
          set -euo pipefail
          KIND="${{ steps.meta.outputs.kind }}"
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          OUT="release-assets"
          rm -rf "$OUT" && mkdir -p "$OUT"

          if [ "$KIND" = "ext" ]; then
            BASENAME="inspect-page"
            PRODUCT="Inspect Page Chrome Extension"
            SRC="public/inspect-page.zip"
          else
            BASENAME="inspect-page-wp"
            PRODUCT="Inspect Page WordPress Plugin"
            SRC="public/inspect-page-wp.zip"
          fi

          VERSIONED="${BASENAME}-v${VERSION}.zip"
          cp "$SRC" "$OUT/$VERSIONED"
          echo "$VERSION" > "$OUT/VERSION.txt"
          if [ -f CHANGELOG.md ]; then cp CHANGELOG.md "$OUT/changelog.md"; fi

          # Installers — extension only (no WP-CLI helper).
          if [ "$KIND" = "ext" ]; then
            if [ -f scripts/install.sh ]; then cp scripts/install.sh "$OUT/install.sh"; fi
            if [ -f scripts/install.ps1 ]; then cp scripts/install.ps1 "$OUT/install.ps1"; fi
          fi

          ( cd "$OUT" && sha256sum * > checksums.txt )

          echo "basename=$BASENAME"       >> "$GITHUB_OUTPUT"
          echo "versioned=$VERSIONED"     >> "$GITHUB_OUTPUT"
          echo "product=$PRODUCT"         >> "$GITHUB_OUTPUT"

      - name: Assemble release notes
        id: notes
        env:
          KIND: ${{ steps.meta.outputs.kind }}
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSIONED: ${{ steps.assets.outputs.versioned }}
          PRODUCT: ${{ steps.assets.outputs.product }}
        run: |
          set -euo pipefail
          BUILD_DATE="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          SHORT_SHA="$(git rev-parse --short=10 "$GITHUB_SHA")"
          BRANCH="release/${TAG}"

          # Previous tag of the same kind (ext- or wp-)
          PREFIX="${KIND}-v"
          PREV_TAG="$(git tag --sort=-version:refname | grep "^${PREFIX}" | grep -v "^${TAG}$" | head -1 || true)"
          if [ -n "$PREV_TAG" ]; then RANGE="${PREV_TAG}..${TAG}"; else RANGE="${TAG}"; fi

          FEATS="$(git log $RANGE --pretty=format:'- %s (%h)' --grep='^feat' -i || true)"
          FIXES="$(git log $RANGE --pretty=format:'- %s (%h)' --grep='^fix' -i || true)"
          OTHER="$(git log $RANGE --pretty=format:'- %s (%h)' --grep='^refactor\|^chore\|^docs\|^perf\|^ci\|^build\|^style\|^test' -i || true)"

          REPO_SLUG="${GITHUB_REPOSITORY}"
          BODY_FILE="release-assets/RELEASE_NOTES.md"
          {
            echo "# ${PRODUCT} v${VERSION}"
            echo
            echo "## Release Info"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`v${VERSION}\` |"
            echo "| Commit | \`${SHORT_SHA}\` |"
            echo "| Branch | \`${BRANCH}\` |"
            echo "| Build Date | ${BUILD_DATE} |"
            echo
            echo "## What's Changed"
            echo
            if [ -n "$FEATS" ]; then echo "### Features"; echo; echo "$FEATS"; echo; fi
            if [ -n "$FIXES" ]; then echo "### Bug Fixes"; echo; echo "$FIXES"; echo; fi
            if [ -n "$OTHER" ]; then echo "### Maintenance"; echo; echo "$OTHER"; echo; fi
            if [ -z "$FEATS$FIXES$OTHER" ]; then echo "_No conventional-commit entries since \`${PREV_TAG:-initial}\`._"; echo; fi
            echo "## Checksums (SHA256)"
            echo
            echo '```'
            cat release-assets/checksums.txt
            echo '```'
            echo
            echo "## Assets"
            echo
            echo "| Asset | Description |"
            echo "|---|---|"
            if [ "$KIND" = "ext" ]; then
              echo "| \`${VERSIONED}\` | Chrome extension — load unpacked in chrome://extensions |"
              echo "| \`install.sh\` | Bash installer (download + unzip + print load-unpacked steps) |"
              echo "| \`install.ps1\` | PowerShell installer (same logic, Windows) |"
            else
              echo "| \`${VERSIONED}\` | WordPress plugin — upload via Plugins → Add New → Upload Plugin |"
            fi
            echo "| \`changelog.md\` | Full project changelog |"
            echo "| \`VERSION.txt\` | Version identifier |"
            echo "| \`checksums.txt\` | SHA256 checksums |"
            echo
            if [ "$KIND" = "ext" ]; then
              echo "## Quick Install (this version, pinned)"
              echo
              echo '**Bash / macOS / Linux:**'
              echo '```bash'
              echo "curl -fsSL https://github.com/${REPO_SLUG}/releases/download/${TAG}/install.sh | bash"
              echo '```'
              echo
              echo '**PowerShell / Windows:**'
              echo '```powershell'
              echo "iwr https://github.com/${REPO_SLUG}/releases/download/${TAG}/install.ps1 -UseBasicParsing | iex"
              echo '```'
              echo
              echo "## Latest channel (auto-updates)"
              echo
              echo '```bash'
              echo "curl -fsSL https://raw.githubusercontent.com/${REPO_SLUG}/main/scripts/install.sh | bash"
              echo '```'
              echo
              echo "## Manual Install (Chromium)"
              echo
              echo "1. Download \`${VERSIONED}\` from this release."
              echo "2. Extract it to a local folder."
              echo "3. Open \`chrome://extensions\`."
              echo "4. Enable **Developer mode** (top-right toggle)."
              echo "5. Click **Load unpacked** and select the extracted folder."
            else
              echo "## Manual Install (WordPress)"
              echo
              echo "1. Download \`${VERSIONED}\` from this release."
              echo "2. In WP Admin, go to **Plugins → Add New → Upload Plugin**."
              echo "3. Choose the zip, click **Install Now**, then **Activate**."
              echo "4. Visit **Tools → Inspect Page** to verify REST + permalinks are healthy."
            fi
          } > "$BODY_FILE"

          echo "body_path=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.assets.outputs.product }} v${{ steps.meta.outputs.version }}"
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.version, '-') }}
          # Q3 = B: only ext-v* ever wins the "Latest" badge.
          make_latest: ${{ steps.meta.outputs.kind == 'ext' && !contains(steps.meta.outputs.version, '-') && 'true' || 'false' }}